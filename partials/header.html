<header class="site-header sticky top-0 z-50 bg-primary py-4">
  <div class="container mx-auto flex items-center justify-between px-4">
    <div class="logo">
      <a href="./" aria-label="Sam & Co home">
        <img
          src="./assets/images/logo.png"
          alt="Sam & Co"
          title="Sam & Co"
          class="h-9 w-auto"
        />
      </a>
    </div>

    <nav
      class="navbar-section hidden items-center space-x-6 lg:flex"
      data-lenis-prevent
      aria-label="Primary"
    >
      <ul class="flex space-x-6">
        <li>
          <a
            class="text-white hover:text-secondary transition-colors duration-300 font-medium text-lg"
            href="./"
            >Home</a
          >
        </li>
        <li>
          <a
            class="text-white hover:text-secondary transition-colors duration-300 font-medium text-lg"
            href="./about.html"
            >About</a
          >
        </li>
        <li>
          <a
            class="text-white hover:text-secondary transition-colors duration-300 font-medium text-lg"
            href="./services.html"
            >Services</a
          >
        </li>
        <li>
          <a
            class="text-white hover:text-secondary transition-colors duration-300 font-medium text-lg"
            href="./contact.html"
            >Contact</a
          >
        </li>
      </ul>
      <a
        class="rounded-md bg-secondary-deep px-4 py-2 font-semibold text-white transition-colors duration-300 border border-transparent hover:bg-white hover:text-primary"
        href="https://calendly.com/samandco"
        target="_blank"
        rel="noopener noreferrer"
        >Book a Consultation</a
      >
    </nav>

    <!-- Mobile menu toggle -->
    <button
      id="menu-toggle"
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-md text-white lg:hidden cursor-pointer"
      aria-controls="mobile-menu"
      aria-expanded="false"
      aria-label="Open menu"
    >
      <svg
        class="h-7 w-7"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="1.8"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>
  </div>
</header>

<!-- Mobile drawer backdrop -->
<div id="mobile-menu-backdrop"></div>

<!-- Mobile drawer (slides in from the right) -->
<aside id="mobile-menu" aria-hidden="true" data-lenis-prevent>
  <div
    class="flex items-center justify-between border-b border-white/10 px-6 py-5"
  >
    <span class="font-display text-lg text-white">Menu</span>
    <button
      id="menu-close"
      type="button"
      aria-label="Close menu"
      class="flex h-8 w-8 items-center justify-center rounded-md text-white hover:bg-white/10"
    >
      <svg
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="1.8"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>
  <nav
    class="flex flex-1 flex-col justify-between px-6 py-8"
    aria-label="Mobile"
  >
    <ul class="flex flex-col space-y-1">
      <li class="drawer-link drawer-link-1">
        <a
          class="block rounded-md px-3 py-3 text-lg font-medium text-white hover:bg-white/10"
          href="./"
          >Home</a
        >
      </li>
      <li class="drawer-link drawer-link-2">
        <a
          class="block rounded-md px-3 py-3 text-lg font-medium text-white hover:bg-white/10"
          href="./about.html"
          >About</a
        >
      </li>
      <li class="drawer-link drawer-link-3">
        <a
          class="block rounded-md px-3 py-3 text-lg font-medium text-white hover:bg-white/10"
          href="./services.html"
          >Services</a
        >
      </li>
      <li class="drawer-link drawer-link-4">
        <a
          class="block rounded-md px-3 py-3 text-lg font-medium text-white hover:bg-white/10"
          href="./contact.html"
          >Contact</a
        >
      </li>
    </ul>
    <a
      class="drawer-link drawer-link-5 mt-8 block rounded-md bg-secondary-deep px-4 py-3 text-center font-semibold text-white"
      href="https://calendly.com/samandco"
      target="_blank"
      rel="noopener noreferrer"
      >Book a Consultation</a
    >
  </nav>
</aside>
